<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>FB Voice Downloader</title>
    <style>
      :root {
        color-scheme: light;
        --bg: #0f172a;
        --bg-accent: #1d4ed8;
        --panel: rgba(15, 23, 42, 0.92);
        --panel-border: rgba(148, 163, 184, 0.18);
        --text: #e2e8f0;
        --muted: #94a3b8;
        --success: #22c55e;
        --switch-off: #334155;
        --switch-on: #16a34a;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        width: 320px;
        font-family:
          Inter,
          ui-sans-serif,
          system-ui,
          -apple-system,
          BlinkMacSystemFont,
          "Segoe UI",
          sans-serif;
        background:
          radial-gradient(
            circle at top right,
            rgba(29, 78, 216, 0.35),
            transparent 40%
          ),
          linear-gradient(160deg, #020617 0%, #0f172a 55%, #111827 100%);
        color: var(--text);
      }

      body {
        display: grid;
        place-items: stretch;
        padding: 14px;
      }

      main {
        position: relative;
        overflow: hidden;
        border: 1px solid var(--panel-border);
        border-radius: 20px;
        background: var(--panel);
        box-shadow: 0 18px 40px rgba(2, 6, 23, 0.35);
        padding: 18px;
      }

      main::before {
        content: "";
        position: absolute;
        inset: auto -20px -45px auto;
        width: 130px;
        height: 130px;
        border-radius: 999px;
        background: radial-gradient(
          circle,
          rgba(34, 197, 94, 0.22),
          transparent 70%
        );
        pointer-events: none;
      }

      .eyebrow {
        margin: 0 0 8px;
        color: #93c5fd;
        font-size: 12px;
        letter-spacing: 0.14em;
        text-transform: uppercase;
      }

      h1 {
        margin: 0;
        font-size: 20px;
        line-height: 1.15;
      }

      .description {
        margin: 8px 0 18px;
        color: var(--muted);
        font-size: 13px;
        line-height: 1.5;
      }

      .switch {
        width: 100%;
        border: 1px solid rgba(148, 163, 184, 0.18);
        border-radius: 16px;
        background: rgba(15, 23, 42, 0.72);
        color: inherit;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 14px;
        padding: 14px;
        cursor: pointer;
        transition:
          transform 160ms ease,
          border-color 160ms ease,
          background 160ms ease;
      }

      .switch:disabled {
        cursor: wait;
        opacity: 0.8;
        transform: none;
      }

      .switch__label {
        display: grid;
        gap: 4px;
        text-align: left;
      }

      .switch__title {
        font-size: 15px;
        font-weight: 700;
      }

      .switch__hint {
        color: var(--muted);
        font-size: 12px;
      }

      .switch__track {
        position: relative;
        flex: 0 0 auto;
        width: 54px;
        height: 32px;
        border-radius: 999px;
        background: var(--switch-off);
        transition: background 160ms ease;
      }

      .switch__thumb {
        position: absolute;
        top: 3px;
        left: 3px;
        width: 26px;
        height: 26px;
        border-radius: 50%;
        background: #f8fafc;
        box-shadow: 0 4px 12px rgba(15, 23, 42, 0.35);
        transition: transform 160ms ease;
      }

      [data-enabled="true"] .switch__track {
        background: var(--switch-on);
      }

      [data-enabled="true"] .switch__thumb {
        transform: translateX(22px);
      }

      .status {
        min-height: 20px;
        margin: 12px 2px 0;
        color: var(--success);
        font-size: 12px;
      }
    </style>
  </head>
  <body>
    <main data-enabled="true">
      <h1 class="eyebrow">Voice Message Downloader for Facebook</h1>

      <button id="toggle" class="switch" type="button" aria-pressed="true">
        <span class="switch__label">
          <span class="switch__title" id="state-label">Enabled</span>
          <span class="switch__hint" id="state-hint">
            Voice message download buttons are active.
          </span>
        </span>
        <span class="switch__track" aria-hidden="true">
          <span class="switch__thumb"></span>
        </span>
      </button>

      <p id="status" class="status" aria-live="polite"></p>
    </main>
    <script type="module" src="./index.ts"></script>
  </body>
</html>
